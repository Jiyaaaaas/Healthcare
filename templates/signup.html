{% extends 'base.html' %}

{% block content %}

<h2>Signup</h2>
<form method="POST">
    {% csrf_token %}
    <input name="username" placeholder="Username"><br><br>
    <input name="password" type="password" placeholder="Password"><br><br>
    <button class="btn btn-success">Signup</button>
</form>

{% endblock %}
